<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Inter, Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            background:
                    radial-gradient(circle at top left, #3b82f6 0%, transparent 40%),
                    radial-gradient(circle at bottom right, #7c3aed 0%, transparent 40%),
                    linear-gradient(135deg, #0f172a, #111827);

            color: white;
        }

        .container {
            width: 380px;
            padding: 32px;

            background: rgba(255,255,255,.08);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255,255,255,.15);
            border-radius: 22px;

            box-shadow:
                    0 25px 60px rgba(0,0,0,.35),
                    inset 0 1px rgba(255,255,255,.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 30px;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tabs button {
            flex: 1;
            border: none;
            background: transparent;
            color: #cbd5e1;

            padding: 12px;
            border-radius: 10px;

            cursor: pointer;
            transition: .25s;
            font-size: 15px;
            font-weight: 600;
        }

        .tabs button.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 8px 18px rgba(59,130,246,.35);
        }

        .tabs button:hover:not(.active) {
            background: rgba(255,255,255,.06);
        }

        form {
            display: none;
        }

        form.active {
            display: block;
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input {
            width: 100%;
            margin-bottom: 15px;

            padding: 14px 16px;

            border-radius: 12px;
            border: 1px solid rgba(255,255,255,.12);

            background: rgba(255,255,255,.08);
            color: white;

            outline: none;
            transition: .2s;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,.18);
        }

        button.submit {
            width: 100%;
            padding: 14px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;

            cursor: pointer;

            font-size: 15px;
            font-weight: 600;

            transition: .25s;
        }

        button.submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59,130,246,.35);
        }

        button.submit:active {
            transform: scale(.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Account</h2>

    <div class="tabs">
        <button id="loginTab" class="active">Login</button>
        <button id="registerTab">Sign Up</button>
    </div>

    <form id="loginForm" class="active">
        <input
                type="text"
                name="name"
                placeholder="Username"
                required
        >

        <input
                type="password"
                name="password"
                placeholder="Password"
                required
        >

        <button class="submit" type="submit">Login</button>
    </form>

    <form id="registerForm">
        <input
                type="text"
                name="name"
                placeholder="Username"
                required
        >
        <input
                type="email"
                name="email"
                placeholder="name@example.com"
                required
        >

        <input
                type="password"
                name="password"
                placeholder="Password"
                required
        >

        <button class="submit" type="submit">Create Account</button>
    </form>
</div>

<script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");


    function switchTab(active, inactive, activeForm, inactiveForm) {
        active.classList.add("active");
        inactive.classList.remove("active");

        activeForm.classList.add("active");
        inactiveForm.classList.remove("active");
    }


    loginTab.addEventListener("click", () => {
        switchTab(
            loginTab,
            registerTab,
            loginForm,
            registerForm
        );
    });


    registerTab.addEventListener("click", () => {
        switchTab(
            registerTab,
            loginTab,
            registerForm,
            loginForm
        );
    });


    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(loginForm);

        const data = {
            name: formData.get("name"),
            password: formData.get("password")
        };


        const response = await fetch("/api/auth/login", {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });


        if (response.ok) {
            window.location.href = "/";
        } else {
            const error = await response.text();
            alert(error);
        }
    });


    registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(registerForm);

        const data = {
            name: formData.get("name"),
            email: formData.get("email"),
            password: formData.get("password")
        };


        const response = await fetch("/api/auth/register", {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });


        if (response.ok) {
            window.location.href = "/";
        } else {
            const error = await response.text();
            alert(error);
        }
    });
</script>

</body>
</html>
