services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - links-service
      - frontend-service
      - analytics-service

  auth-service:
    build: ./auth-service
    environment:
      PORT: 3001
    expose:
      - "3001"

  links-service:
    build: ./links-service
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://rabbitmq:5672
    restart: unless-stopped
    expose:
      - "3002"
    depends_on:
      - rabbitmq

  frontend-service:
    build: ./frontend-service
    environment:
      PORT: 3003
    expose:
      - "3003"

  analytics-service:
    build: ./analytics-service
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://rabbitmq:5672
    restart: unless-stopped
    expose:
      - "3004"
    depends_on:
      - rabbitmq